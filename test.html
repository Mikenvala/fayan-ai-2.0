<!DOCTYPE html><html><head><meta charset="UTF-8"><title>测试</title>
<style>body{font-family:sans-serif;padding:40px;background:#111;color:#fff}
button{padding:14px 28px;margin:8px;font-size:18px;border-radius:8px;cursor:pointer;border:none}
.green{background:#22c55e;color:#000}.blue{background:#3b82f6;color:#fff}.red{background:#ef4444;color:#fff}
#out{background:#1a1a2e;padding:20px;margin-top:20px;border-radius:8px;font-family:monospace;white-space:pre-wrap;min-height:100px}</style></head>
<body>
<h1>🔬 浏览器诊断</h1>
<button class="green" onclick="testOnClick()">1. onclick 测试</button>
<button class="blue" id="btnFetch">2. fetch 测试</button>
<button class="red" onclick="location.reload()">3. 刷新页面</button>
<div id="out">等待操作...</div>
<script>
var out = document.getElementById("out");
function log(msg) { out.textContent += "\\n" + msg; }

function testOnClick() {
  log("✅ onclick 工作正常！");
}

document.getElementById("btnFetch").onclick = function() {
  log("⏳ 正在 fetch /status ...");
  fetch("/status").then(r=>r.json()).then(d=>{
    log("✅ fetch 成功！模型：" + d.model + " 案例：" + d.cases_count);
  }).catch(e=>{
    log("❌ fetch 失败：" + e.message);
  });
};

log("页面加载完成，请点击按钮测试");
</script></body></html>
