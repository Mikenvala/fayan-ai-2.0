name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r platform/requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile platform/app.py
          python -m py_compile platform/agents.py
          python -m py_compile platform/data.py
      - name: Dashboard data (skip if no CSV)
        run: |
          if [ -f all_cases_perfect.csv ]; then
            cd platform && python data.py
          else
            echo "[SKIP] No data file"
          fi
        env:
          SKIP_LLM: 'true'
