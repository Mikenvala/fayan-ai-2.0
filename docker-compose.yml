
services:
  fayan-ai:
    build: .
    container_name: fayan-ai-2.0
    ports:
      - "8800:8800"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
    volumes:
      - ./platform/static/data:/app/platform/static/data
    restart: unless-stopped
