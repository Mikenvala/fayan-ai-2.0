<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法眼AI - 智能法律案例分析系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:#1F2937;background:#F9FAFB;min-height:100vh}
.header{background:linear-gradient(135deg,#7F1D1D,#5B0E0E);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(127,29,29,.25)}
.header h1{font-size:1.4rem;font-weight:700}
.header .status{display:flex;align-items:center;gap:8px;font-size:.85rem}
.status-dot{width:8px;height:8px;border-radius:50%;background:#34D399}
.main{max-width:1280px;margin:24px auto;padding:0 24px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.card{background:#fff;border-radius:12px;padding:28px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #E5E7EB}
.card h2{font-size:1.1rem;font-weight:700;margin-bottom:16px}
textarea{width:100%;min-height:160px;padding:14px;border:1.5px solid #D1D5DB;border-radius:8px;font-size:.92rem;resize:vertical;line-height:1.7;font-family:inherit}
textarea:focus{outline:none;border-color:#7F1D1D;box-shadow:0 0 0 3px rgba(127,29,29,.08)}
.row{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap;align-items:center}
input[type=number]{width:100%;padding:10px 14px;border:1.5px solid #D1D5DB;border-radius:8px;font-size:.92rem}
input[type=number]:focus{outline:none;border-color:#7F1D1D}
.half{flex:1;min-width:140px}
label{display:block;font-size:.85rem;font-weight:600;color:#4B5563;margin-bottom:4px}
.check{display:flex;align-items:center;gap:6px;font-size:.85rem;cursor:pointer}
.check input{width:16px;height:16px;accent-color:#7F1D1D}
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;border-radius:8px;font-size:.92rem;font-weight:600;border:none;cursor:pointer;transition:.2s;font-family:inherit}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#7F1D1D;color:#fff}
.btn-primary:hover:not(:disabled){background:#991B1B}
.btn-outline{background:#fff;color:#7F1D1D;border:1.5px solid #D1D5DB}
.btn-outline:hover:not(:disabled){background:#FEF2F2;border-color:#7F1D1D}
.btn-sm{padding:4px 10px;font-size:.75rem;border-radius:20px;border:1px solid #D1D5DB;background:#fff;cursor:pointer;margin:2px}
.btn-sm:hover{background:#FEF2F2;border-color:#7F1D1D;color:#7F1D1D}
.tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:700}
.tag-civil{background:#D1FAE5;color:#065F46}
.tag-crime{background:#FEE2E2;color:#991B1B}
.tag-cross{background:#FEF3C7;color:#92400E}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.78rem;font-weight:700}
.badge-low{background:#D1FAE5;color:#065F46}
.badge-medium{background:#DBEAFE;color:#1E40AF}
.badge-high{background:#FEF3C7;color:#92400E}
.badge-ultra{background:#FEE2E2;color:#991B1B}
#out{background:#F9FAFB;padding:16px;border-radius:8px;min-height:100px;font-size:.92rem;line-height:1.8;white-space:pre-wrap;word-break:break-word;margin-top:12px}
#retrieveList .item{padding:14px;background:#F9FAFB;border-radius:8px;border:1px solid #E5E7EB;margin-bottom:8px}
#retrieveList .item h4{font-size:.85rem;margin-bottom:4px}
#retrieveList .item p{font-size:.78rem;color:#6B7280}
.alert{padding:12px 16px;border-radius:8px;font-size:.85rem;margin:8px 0}
.alert-warn{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.alert-err{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.loading{text-align:center;padding:40px}
.spinner{width:40px;height:40px;border:3px solid #E5E7EB;border-top-color:#7F1D1D;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:20px;color:#9CA3AF;font-size:.78rem;border-top:1px solid #E5E7EB;margin-top:40px}
#classifyOut{display:none;padding:12px;background:#FDF2F2;border:1px solid #7F1D1D;border-radius:8px;margin:8px 0;font-size:.82rem}
</style>
</head>
<body>

<div class="header">
  <h1>⚖️ 法眼AI</h1>
  <div class="status"><span class="status-dot" style="background:#34D399"></span>在线 · deepseek-chat · 10,241 条案例</div>
</div>

<div class="main">
  <!-- 左侧输入 -->
  <div>
    <div class="card">
      <h2>📋 案情输入</h2>
      <div id="examples" style="margin-bottom:8px"></div>
      <textarea id="caseText" placeholder="请输入完整的案件描述..." rows="8" maxlength="5000"></textarea>
      <div style="text-align:right;font-size:.75rem;color:#9CA3AF;margin-top:4px"><span id="charCount">0</span>/5000</div>

      <div class="row">
        <div class="half"><label>💰 涉案金额（元）</label><input type="number" id="amount" placeholder="例如：500000"></div>
        <div class="half"><label>👥 当事人数量</label><input type="number" id="partyCount" value="2" min="1" max="50"></div>
      </div>
      <div class="row">
        <label class="check"><input type="checkbox" id="evidenceGap"> 存在证据缺口</label>
        <label class="check"><input type="checkbox" id="criminalCross"> 刑民交叉案件</label>
      </div>

      <div id="classifyOut"></div>

      <div class="row">
        <button class="btn btn-outline" onclick="doClassify()">🔍 自动识别</button>
        <button class="btn btn-primary" onclick="doAnalyze()">⚖️ 开始分析</button>
      </div>
    </div>

    <div class="card" id="retrieveCard" style="display:none">
      <h2>📚 相似案例</h2>
      <p id="retrieveCount" style="font-size:.82rem;color:#6B7280;margin-bottom:8px"></p>
      <div id="retrieveList"></div>
    </div>
  </div>

  <!-- 右侧结果 -->
  <div>
    <div id="resultPanel" class="card" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0">📊 分析结果</h2>
        <span id="typeBadge" class="tag tag-civil">-</span>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;padding-bottom:12px;border-bottom:1px solid #E5E7EB;margin-bottom:12px;font-size:.82rem">
        <span>复杂度: <span id="complexBadge" class="badge badge-medium">-</span></span>
      </div>
      <div id="lawyerWarn" class="alert alert-warn" style="display:none"></div>
      <div id="errorMsg" class="alert alert-err" style="display:none"></div>
      <div id="out"></div>
      <div id="exportBtns" style="display:flex;gap:8px;margin-top:12px"></div>
    </div>

    
    <div id="emptyPanel" class="card" style="text-align:center;padding:60px">
      <div style="font-size:48px;margin-bottom:12px">⚖️</div>
      <h3>等待案件输入</h3>
      <p style="color:#9CA3AF;font-size:.85rem">输入案情后点击「开始分析」</p>
    </div>

    <div id="loadingPanel" class="card loading" style="display:none">
      <div class="spinner"></div>
      <p id="loadingText">正在分析...</p>
    </div>
  </div>
</div>

<div class="footer">⚠️ AI分析仅供参考，不构成法律意见 | 法眼AI v2 · DeepSeek-Chat</div>

<script>
// ====== 全局函数 ======
var _out = '', _classifyData = null;

function $(id){return document.getElementById(id)}

// 字数统计
$('caseText').oninput = function(){ $('charCount').textContent = this.value.length }
$('caseText').onkeydown = function(e){ if(e.ctrlKey && e.key==='Enter') doAnalyze() }

// 加载示例
fetch('/api/examples').then(r=>r.json()).then(d=>{
  if(!d.examples) return;
  var h = '<span style="font-size:.75rem;color:#9CA3AF">💡 快速示例：</span> ';
  d.examples.forEach(function(ex){
    h += '<button class="btn-sm" onclick="$(\'caseText\').value=\''+ex.text.replace(/'/g,"\\'")+'\';$(\'charCount\').textContent='+ex.text.length+';$(\'amount\').value='+(ex.amount||0)+';$(\'partyCount\').value='+(ex.party_count||2)+'">'+ex.title+'</button> ';
  });
  $('examples').innerHTML = h;
}).catch(function(){});

// 分类
async function doClassify(){
  var t = $('caseText').value.trim();
  if(t.length<5) return alert('请输入至少5个字');
  var btn = event.target; btn.disabled=true; btn.textContent='识别中...';
  try{
    var r = await fetch('/api/classify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({case_text:t})});
    var d = await r.json();
    _classifyData = d;
    var tc = {'民事':'cls-type-civil','刑事':'cls-type-crime','刑民交叉':'cls-type-cross'};
    var o = $('classifyOut'); o.style.display='block';
    o.innerHTML = '识别：<b>'+d.case_type+'</b> | 置信度 '+(d.confidence*100).toFixed(0)+'%'+(d.party_count?' | '+d.party_count+'方当事人':'');
    if(d.amount && !$('amount').value) $('amount').value = Math.round(d.amount);
    if(d.party_count) $('partyCount').value = d.party_count;
  }catch(e){alert('分类失败')}
  btn.disabled=false; btn.textContent='🔍 自动识别';
}

// 分析
async function doAnalyze(){
  var t = $('caseText').value.trim();
  if(t.length<10) return alert('请输入至少10个字');

  var btn = event.target; btn.disabled=true; btn.textContent='⏳ 分析中...';
  $('emptyPanel').style.display='none';
  $('loadingPanel').style.display='block';
  $('resultPanel').style.display='none';
  $('retrieveCard').style.display='none';
  $('errorMsg').style.display='none';
  $('lawyerWarn').style.display='none';
  $('out').textContent = '';
  $('exportBtns').innerHTML = '';

  try{
    var resp = await fetch('/api/analyze',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        case_text:t,
        amount:parseFloat($('amount').value)||0,
        party_count:parseInt($('partyCount').value)||2,
        has_evidence_gap:$('evidenceGap').checked,
        has_criminal_cross:$('criminalCross').checked
      })
    });

    var data = await resp.json();
    $('loadingPanel').style.display='none';
    $('resultPanel').style.display='block';
    var d = data;
    $('typeBadge').textContent = d.case_kind==='criminal'?'刑事':'民事';
    $('typeBadge').className = 'tag '+(d.case_kind==='criminal'?'tag-crime':'tag-civil');
    var cm = {low:'简单',medium:'中等',high:'复杂',ultra:'极复杂'};
    $('complexBadge').textContent = cm[d.complexity]||d.complexity;
    $('complexBadge').className = 'badge badge-'+(d.complexity||'medium');
    if(d.lawyer_referral){
      $('lawyerWarn').style.display='block';
      $('lawyerWarn').innerHTML = '⚠️ '+d.lawyer_message;
    }
    var concs = d.conclusions||[];
    if(concs.length) $('out').textContent = concs[0].content||'无结论';
    // 引用
    if(concs.length && concs[0].citations){
      var cits = concs[0].citations;
      for(var i=0;i<cits.length;i++){
        $('out').textContent += '\n📋 '+cits[i].id;
      }
    }

    // 导出按钮
    $('exportBtns').innerHTML = '<button class="btn btn-outline" style="font-size:.82rem;padding:6px 14px" onclick="navigator.clipboard.writeText($(\'out\').textContent).then(function(){alert(\'已复制!\')})">📋 复制结果</button>';

    // 检索相似案例
    try{
      var rd = await fetch('/api/retrieve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:t,top_k:5})}).then(function(r){return r.json()});
      if(rd.results){
        $('retrieveCard').style.display='block';
        $('retrieveCount').textContent = '找到 '+rd.total+' 条相似案例';
        var list = $('retrieveList'); list.innerHTML='';
        rd.results.forEach(function(r){
          list.innerHTML += '<div class="item"><h4>['+(r.score*100).toFixed(1)+'%] '+(r.title||r.case_number)+'</h4><p>'+r.court+' | '+r.cause_of_action+'</p><p>'+(r.ruling_points||'').slice(0,200)+'</p></div>';
        });
      }
    }catch(e){}

  }catch(e){
    $('loadingPanel').style.display='none';
    $('resultPanel').style.display='block';
    $('errorMsg').style.display='block';
    $('errorMsg').textContent = '❌ '+e.message;
  }
  btn.disabled=false; btn.textContent='⚖️ 开始分析';
}

// 状态已通过静态HTML显示


</script>
</body>
</html>
