<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法眼AI · 数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#7F1D1D,#5B0E0E);color:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.3rem;display:flex;align-items:center;gap:8px}
.header a{color:#fca5a5;text-decoration:none;font-size:.85rem}
.header a:hover{color:#fff}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:24px 32px}
.summary .card{background:#fff;border-radius:10px;padding:20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.summary .card .num{font-size:2rem;font-weight:700;color:#7F1D1D}
.summary .card .label{font-size:.8rem;color:#999;margin-top:4px}
.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 32px 32px}
.dashboard .panel{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.panel h3{font-size:.95rem;margin-bottom:12px;color:#555;border-left:3px solid #7F1D1D;padding-left:8px}
.chart{width:100%;height:360px}
.full{grid-column:1/-1}
.footer{text-align:center;color:#bbb;font-size:.75rem;padding:16px}
@media(max-width:768px){.summary{grid-template-columns:repeat(2,1fr)}.dashboard{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>⚖️ 法眼AI · 数据看板</h1>
  <div>
    <a href="/">← 返回分析</a>
  </div>
</div>

<div class="summary">
  <div class="card"><div class="num" id="totalCases">-</div><div class="label">案例总数</div></div>
  <div class="card"><div class="num" id="civilCount">-</div><div class="label">民事案件</div></div>
  <div class="card"><div class="num" id="criminalCount">-</div><div class="label">刑事案件</div></div>
  <div class="card"><div class="num" id="adminCount">-</div><div class="label">行政案件</div></div>
</div>

<div class="dashboard">
  <div class="panel"><h3>📊 案件类别分布</h3><div class="chart" id="chartCategory"></div></div>
  <div class="panel"><h3>📅 年份分布趋势</h3><div class="chart" id="chartYear"></div></div>
  <div class="panel"><h3>🔑 高频关键词 (Top 20)</h3><div class="chart" id="chartKeywords"></div></div>
  <div class="panel"><h3>📂 主要案由分布</h3><div class="chart" id="chartCause"></div></div>
</div>

<div class="footer">法眼AI · 智能法律案例分析系统 · 数据统计看板</div>

<script>
fetch('/api/stats')
  .then(r => r.json())
  .then(data => {
    // 概览数字
    document.getElementById('totalCases').textContent = (data.total_cases || 0).toLocaleString();
    const catMap = {};
    (data.category_distribution || []).forEach(c => { catMap[c.name] = c.value; });
    document.getElementById('civilCount').textContent = (catMap['民事'] || 0).toLocaleString();
    document.getElementById('criminalCount').textContent = (catMap['刑事'] || 0).toLocaleString();
    document.getElementById('adminCount').textContent = (catMap['行政'] || 0).toLocaleString();

    // 1. 类别分布饼图
    const catColors = { '民事':'#34D399', '刑事':'#F87171', '行政':'#FBBF24', '其他':'#9CA3AF' };
    renderPie('chartCategory', data.category_distribution, catColors, '案件类别');

    // 2. 年份趋势
    const years = (data.year_distribution || []).map(d => d.year);
    const yearCounts = (data.year_distribution || []).map(d => d.count);
    renderBar('chartYear', years, yearCounts, '案例数量');

    // 3. 关键词
    const topKw = (data.top_keywords || []).slice(0, 20);
    renderBarH('chartKeywords', topKw.map(d => d.name).reverse(), topKw.map(d => d.value).reverse());

    // 4. 案由
    const topCause = (data.top_cause_of_action || []).slice(0, 15);
    renderBarH('chartCause', topCause.map(d => d.name).reverse(), topCause.map(d => d.value).reverse());
  })
  .catch(err => {
    document.querySelectorAll('.num').forEach(el => el.textContent = '加载失败');
    console.error(err);
  });

function renderPie(id, data, colors, name) {
  const chart = echarts.init(document.getElementById(id));
  chart.setOption({
    tooltip: { trigger: 'item', formatter: '{b}: {c} 条 ({d}%)' },
    legend: { bottom: 0 },
    series: [{
      name, type: 'pie', radius: ['45%','72%'], center: ['50%','48%'],
      label: { show: true, formatter: '{b}\n{d}%' },
      data: data.map(d => ({...d, itemStyle:{color:colors[d.name]||'#ccc'}})),
      emphasis: { itemStyle:{shadowBlur:10,shadowOffsetX:0,shadowColor:'rgba(0,0,0,.3)'} }
    }]
  });
}

function renderBar(id, xData, yData, name) {
  const chart = echarts.init(document.getElementById(id));
  chart.setOption({
    tooltip: { trigger:'axis', formatter:'{b}年<br/>{c} 条' },
    grid: { left:50, right:20, top:20, bottom:30 },
    xAxis: { type:'category', data:xData, axisLabel:{rotate:45} },
    yAxis: { type:'value', name:'案例数' },
    series: [{
      name, type:'bar', data:yData,
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[
        {offset:0,color:'#991B1B'},{offset:1,color:'#FCA5A5'}])
      }
    }]
  });
}

function renderBarH(id, yData, xData) {
  const chart = echarts.init(document.getElementById(id));
  chart.setOption({
    tooltip: { trigger:'axis', formatter:'{b}: {c} 次' },
    grid: { left:140, right:30, top:10, bottom:20 },
    xAxis: { type:'value', name:'出现次数' },
    yAxis: { type:'category', data:yData, axisLabel:{fontSize:10} },
    series: [{
      type:'bar', data:xData,
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0,[
        {offset:0,color:'#7F1D1D'},{offset:1,color:'#FCA5A5'}])
      }
    }]
  });
}
</script>
</body>
</html>
